apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    service: n8n
  name: n8n
spec:
  replicas: 1
  selector:
    matchLabels:
      service: n8n
  strategy:
    type: Recreate
  revisionHistoryLimit: 3
  template:
    metadata:
      labels:
        service: n8n
    spec:
      initContainers:
        - name: volume-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown 1000:1000 /data"]
          volumeMounts:
            - name: n8n-claim0
              mountPath: /data
        - name: oidc-hooks
          image: alpine:3.21
          command:
            - sh
            - -c
            - |
              apk add --no-cache curl &&
              curl -fsSL https://raw.githubusercontent.com/cweagans/n8n-oidc/main/hooks.js -o /opt/n8n-oidc/hooks.js
          volumeMounts:
            - name: oidc-hooks
              mountPath: /opt/n8n-oidc
      containers:
        - command:
            - /bin/sh
          args:
            - -c
            - sleep 5; n8n start
          env:
            # Database
            - name: DB_TYPE
              value: postgresdb
            - name: DB_POSTGRESDB_HOST
              value: n8n.n8n.svc.cluster.local
            - name: DB_POSTGRESDB_PORT
              value: "5432"
            - name: DB_POSTGRESDB_DATABASE
              value: data
            - name: DB_POSTGRESDB_USER
              valueFrom:
                secretKeyRef:
                  name: application.n8n.credentials.postgresql.acid.zalan.do
                  key: username
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: application.n8n.credentials.postgresql.acid.zalan.do
                  key: password
            - name: DB_POSTGRESDB_SSL_ENABLED
              value: "true"
            - name: DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED
              value: "false"
            # n8n core
            - name: N8N_PROTOCOL
              value: http
            - name: N8N_PORT
              value: "5678"
            - name: N8N_HOST
              value: auto.stefanmuraru.com
            - name: N8N_EDITOR_BASE_URL
              value: https://auto.stefanmuraru.com
            - name: WEBHOOK_URL
              value: https://auto.stefanmuraru.com/
            - name: N8N_PROXY_HOPS
              value: "1"
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-credentials
                  key: encryption_key
            # OIDC (n8n-oidc community hooks)
            - name: EXTERNAL_HOOK_FILES
              value: /opt/n8n-oidc/hooks.js
            - name: EXTERNAL_FRONTEND_HOOKS_URLS
              value: /assets/oidc-frontend-hook.js
            - name: N8N_ADDITIONAL_NON_UI_ROUTES
              value: auth
            - name: OIDC_ISSUER_URL
              value: https://auth.stefanmuraru.com/application/o/n8n/
            - name: OIDC_REDIRECT_URI
              value: https://auto.stefanmuraru.com/auth/oidc/callback
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: n8n-credentials
                  key: oidc_client_id
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: n8n-credentials
                  key: oidc_client_secret
          image: n8nio/n8n
          name: n8n
          ports:
            - containerPort: 5678
          resources:
            requests:
              cpu: "100m"
              memory: "250Mi"
            limits:
              cpu: "500m"
              memory: "500Mi"
          volumeMounts:
            - mountPath: /home/node/.n8n
              name: n8n-claim0
            - mountPath: /opt/n8n-oidc
              name: oidc-hooks
              readOnly: true
      restartPolicy: Always
      volumes:
        - name: n8n-claim0
          persistentVolumeClaim:
            claimName: n8n-appdata
        - name: oidc-hooks
          emptyDir: {}

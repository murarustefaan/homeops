image:
  flavor: apache

replicaCount: 1

nextcloud:
  host: cloud.stefanmuraru.com
  existingSecret:
    enabled: true
    secretName: nextcloud-credentials
    usernameKey: username
    passwordKey: password

internalDatabase:
  enabled: false

externalDatabase:
  enabled: true
  type: postgresql
  host: nextcloud-data
  database: data
  user: nextcloud
  existingSecret:
    enabled: true
    secretName: nextcloud.nextcloud-data.credentials.postgresql.acid.zalan.do
    usernameKey: username
    passwordKey: password

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    existingSecret: nextcloud-credentials
    existingSecretPasswordKey: redis-password
  master:
    persistence:
      enabled: true
      size: 2Gi
      storageClass: "zoom"
    resources:
      requests:
        memory: 128Mi
        cpu: 100m
      limits:
        memory: 256Mi
        cpu: 500m

ingress:
  enabled: true
  className: "public"
  annotations:
    cert-manager.io/cluster-issuer: stefanmuraru-com-issuer
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    external-dns.alpha.kubernetes.io/hostname: cloud.stefanmuraru.com
    external-dns.alpha.kubernetes.io/target: d473da53-e5a4-4535-b3f0-6e36d165b874.cfargotunnel.com
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10G"
  tls:
    - secretName: nextcloud-tls
      hosts:
        - cloud.stefanmuraru.com

persistence:
  enabled: true
  size: 200Gi
  storageClass: "zoom"

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

livenessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 5

readinessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 5

cronjob:
  enabled: true

phpClientHttpsFix:
  enabled: true
  protocol: https

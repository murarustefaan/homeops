apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    service: paperless
  name: paperless-data
spec:
  storageClassName: zoom
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

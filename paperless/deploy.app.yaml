apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: paperless
  namespace: argocd
spec:
  destination:
    namespace: paperless
    server: 'https://kubernetes.default.svc'
  source:
    repoURL: 'https://github.com/murarustefaan/homeops.git'
    targetRevision: HEAD
    path: paperless
  project: infrastructure
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-app-flipper-ci
  namespace: argocd
spec:
  secretStoreRef:
    name: 1password-sdk
    kind: ClusterSecretStore
  refreshPolicy: OnChange
  target:
    name: github-app-flipper-ci
    creationPolicy: Owner
  data:
    - secretKey: githubAppID
      remoteRef:
        key: flipper-ci/app_id
    - secretKey: githubAppInstallationID
      remoteRef:
        key: flipper-ci/installation_id
    - secretKey: githubAppPrivateKey
      remoteRef:
        key: flipper-ci/private_key

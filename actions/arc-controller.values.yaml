replicaCount: 1

image:
  repository: "ghcr.io/actions/gha-runner-scale-set-controller"
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

flags:
  logLevel: "info"
  logFormat: "text"
  updateStrategy: "eventual"
  watchSingleNamespace: "actions"
  excludeLabelPropagationPrefixes:
    - "argocd.argoproj.io/instance"

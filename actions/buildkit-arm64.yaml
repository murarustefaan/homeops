apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    service: buildkit-arm64
  name: buildkit-arm64
spec:
  serviceName: buildkit-arm64
  replicas: 1
  selector:
    matchLabels:
      service: buildkit-arm64
  revisionHistoryLimit: 3
  template:
    metadata:
      labels:
        service: buildkit-arm64
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      containers:
        - name: buildkitd
          image: moby/buildkit:v0.29.0
          args:
            - --addr
            - tcp://0.0.0.0:1234
          ports:
            - containerPort: 1234
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "4"
              memory: "4Gi"
          volumeMounts:
            - name: buildkit-cache
              mountPath: /var/lib/buildkit
            - name: registry-auth
              mountPath: /home/user/.docker
              readOnly: true
          readinessProbe:
            exec:
              command:
                - buildctl
                - --addr
                - tcp://localhost:1234
                - debug
                - workers
            initialDelaySeconds: 5
            periodSeconds: 15
          livenessProbe:
            exec:
              command:
                - buildctl
                - --addr
                - tcp://localhost:1234
                - debug
                - workers
            initialDelaySeconds: 5
            periodSeconds: 30
      volumes:
        - name: registry-auth
          secret:
            secretName: buildkit-registry-auth
            items:
              - key: config.json
                path: config.json
  volumeClaimTemplates:
    - metadata:
        name: buildkit-cache
      spec:
        storageClassName: zoom
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  labels:
    service: buildkit-arm64
  name: buildkit-arm64
spec:
  type: ClusterIP
  ports:
    - name: buildkit
      port: 1234
      targetPort: 1234
      protocol: TCP
  selector:
    service: buildkit-arm64

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-worker
  namespace: argocd
spec:
  destination:
    namespace: actions
    server: 'https://kubernetes.default.svc'
  sources:
    - repoURL: 'ghcr.io/actions/actions-runner-controller-charts'
      chart: gha-runner-scale-set
      targetRevision: 0.14.0
      helm:
        valueFiles:
          - $values/actions/worker.values.yaml
    - repoURL: 'https://github.com/murarustefaan/homeops.git'
      targetRevision: HEAD
      ref: values
  project: infrastructure
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true

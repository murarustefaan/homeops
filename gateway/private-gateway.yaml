apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: private
  namespace: gateway-system
spec:
  gatewayClassName: cilium
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: "*.stefanmuraru.com"
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.stefanmuraru.com"
      tls:
        mode: Terminate
        certificateRefs:
          - name: star-stefanmuraru-com-tls
      allowedRoutes:
        namespaces:
          from: All

apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: public
  namespace: gateway-system
  annotations:
    cert-manager.io/cluster-issuer: stefanmuraru-com-issuer
spec:
  gatewayClassName: cilium
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: "*.stefanmuraru.com"
      allowedRoutes:
        namespaces:
          from: All
    - name: http-apex
      protocol: HTTP
      port: 80
      hostname: "stefanmuraru.com"
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.stefanmuraru.com"
      tls:
        mode: Terminate
        certificateRefs:
          - name: star-stefanmuraru-com-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: https-apex
      protocol: HTTPS
      port: 443
      hostname: "stefanmuraru.com"
      tls:
        mode: Terminate
        certificateRefs:
          - name: star-stefanmuraru-com-tls
      allowedRoutes:
        namespaces:
          from: All
